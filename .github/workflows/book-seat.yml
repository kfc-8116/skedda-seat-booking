name: Book Skedda Seat

on:
  schedule:
    # Run at 00:01 SGT (16:01 UTC previous day) on Wed/Sat/Sun only
    # Wed 00:01 SGT → Tue 16:01 UTC → books Monday (12 days ahead)
    # Sat 00:01 SGT → Fri 16:01 UTC → books Thursday (12 days ahead)
    # Sun 00:01 SGT → Sat 16:01 UTC → books Friday (12 days ahead)
    - cron: "1 16 * * 2,5,6"
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  book:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Run booking script
        env:
          SKEDDA_URL: ${{ secrets.SKEDDA_URL }}
          SKEDDA_EMAIL: ${{ secrets.SKEDDA_EMAIL }}
          SKEDDA_PASS: ${{ secrets.SKEDDA_PASS }}
          SEAT_PRIORITY: ${{ secrets.SEAT_PRIORITY }}
          BOOKING_START: "09:00"
          BOOKING_END: "18:00"
          DAYS_AHEAD: "12"
          BOOKING_DAYS: "0,3,4"
        run: python book_seat.py
